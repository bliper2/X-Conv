<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CHANGE // CELESTIAL EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-dark: rgba(10, 10, 10, 0.95);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --accent-blue: #4d9fff;
            --accent-violet: #a78bfa;
            --up-green: #4ade80;
            --down-red: #f87171;
            --font: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); }

        body {
            background-color: var(--bg-black);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- BACKGROUND & FX --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #mouse-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 0, 255, 0.12) 0%, rgba(0, 68, 255, 0.05) 50%, transparent 100%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1;
            transition: opacity 0.5s ease;
        }

        .cursor-trail-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--accent-blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.6;
            transition: transform 0.1s linear, opacity 0.4s ease;
        }

        /* --- LAYOUT --- */
        .app-container {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 24px;
            padding: 40px 0;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 32px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s forwards;
        }

        .card:nth-child(2) { animation-delay: 0.2s; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- UI ELEMENTS --- */
        .header { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; color: var(--text-primary); }
        .logo span { color: var(--accent-blue); }

        .label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 12px; display: block; }

        .input-group { position: relative; margin-bottom: 24px; }
        .amount-input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            font-size: 32px;
            font-weight: 700;
            color: white;
            border-radius: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        .amount-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 20px rgba(77, 159, 255, 0.15); }

        .converter-row { display: grid; grid-template-columns: 1fr 60px 1fr; align-items: center; gap: 16px; margin-bottom: 32px; }

        .selector-trigger {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }
        .selector-trigger:hover { border-color: var(--accent-violet); background: rgba(255,255,255,0.1); }
        .selector-trigger .flag { font-size: 24px; }
        .selector-trigger .code { font-weight: 700; font-size: 18px; }

        .swap-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05); color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
        }
        .swap-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--accent-blue); }

        .result-display { margin-top: 40px; }
        .result-rate { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .result-value { font-size: 56px; font-weight: 800; word-break: break-all; line-height: 1; }
        
        .pulse-arrow { display: inline-block; animation: pulse 2s infinite; font-weight: bold; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.9); } }

        canvas#sparkline { width: 100%; height: 100px; margin-top: 24px; }

        /* --- DROPDOWN --- */
        .dropdown-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; justify-content: center;
            align-items: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .dropdown-panel {
            width: 450px; max-height: 80vh; background: var(--glass-dark);
            border: 1px solid var(--glass-border); border-radius: 24px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .dropdown-tabs { display: flex; border-bottom: 1px solid var(--glass-border); }
        .tab {
            flex: 1; padding: 16px; text-align: center; cursor: pointer;
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
            transition: 0.3s;
        }
        .tab.active { color: var(--accent-blue); border-bottom: 2px solid var(--accent-blue); background: rgba(255,255,255,0.03); }

        .search-box { padding: 20px; border-bottom: 1px solid var(--glass-border); position: relative; }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 12px 16px; border-radius: 12px; color: white; outline: none; font-size: 14px;
        }
        .search-box input:focus { border-color: var(--accent-violet); }

        .list-container { flex: 1; overflow-y: auto; padding-right: 30px; position: relative; }
        .list-container::-webkit-scrollbar { width: 4px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }

        .az-sidebar {
            position: absolute; right: 4px; top: 20px; bottom: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            font-size: 9px; color: var(--text-secondary); font-weight: 700;
        }
        .az-sidebar span { cursor: pointer; padding: 1px 4px; }
        .az-sidebar span:hover { color: var(--accent-blue); }

        .group-header {
            padding: 12px 20px; font-size: 11px; font-weight: 800; color: var(--accent-blue);
            background: rgba(255,255,255,0.02); position: sticky; top: 0; z-index: 5;
        }
        .currency-item {
            display: flex; align-items: center; gap: 16px; padding: 12px 20px;
            cursor: pointer; transition: 0.2s;
        }
        .currency-item:hover { background: rgba(255,255,255,0.05); }
        .currency-item .info h4 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .currency-item .info p { font-size: 11px; color: var(--text-secondary); }

        /* --- SIDEBAR --- */
        .sidebar { display: flex; flex-direction: column; gap: 24px; }
        .panel-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        
        .comp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .comp-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; }
        .comp-item .c-code { font-size: 10px; font-weight: 700; color: var(--accent-violet); margin-bottom: 4px; }
        .comp-item .c-val { font-size: 16px; font-weight: 700; }

        .history-list { list-style: none; }
        .history-row {
            display: flex; justify-content: space-between; padding: 10px 0;
            border-bottom: 1px solid var(--glass-border); font-size: 13px;
        }
        .history-row .h-pair { font-weight: 600; }
        .history-row .h-rate { color: var(--text-secondary); }

        .fav-star { cursor: pointer; transition: 0.3s; }
        .fav-star.active { color: #fbbf24; fill: #fbbf24; }

        @media (max-width: 850px) {
            .app-container { grid-template-columns: 1fr; padding: 20px; }
            .header { grid-column: 1; }
            .dropdown-panel { width: 95%; height: 70vh; }
        }
    </style>
</head>

        // --- STATE ---
        let state = {
            from: 'USD',
            to: 'EUR',
            amount: 100.0,
            rates: {},
            favorites: JSON.parse(localStorage.getItem('fav_pairs')) || [],
            history: JSON.parse(localStorage.getItem('conv_history')) || [],
            activeTab: 'currency', // 'currency' or 'country'
            targetSide: 'from' // 'from' or 'to'
        };

        const API_URL = "https://open.er-api.com/v6/latest/";

        /**
         * INITIALIZATION
         */
        function init() {
            setupCanvas();
            setupCursor();
            renderAZ();
            loadRates();
            renderHistory();
            
            document.getElementById('amount-input').addEventListener('input', (e) => {
                state.amount = parseFloat(e.target.value) || 0;
                updateResults();
            });
        }

        // --- CANVAS BACKGROUND SYSTEM ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let shootingStars = [];
        let mouse = { x: -1000, y: -1000 };

        function setupCanvas() {
            window.addEventListener('resize', resize);
            resize();
            for(let i=0; i<80; i++) particles.push(new Particle());
            animate();
            setInterval(createShootingStar, 4000);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.size = Math.random() * 2;
            }
            update() {
                // Mouse Repel
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 100) {
                    let angle = Math.atan2(dy, dx);
                    this.vx -= Math.cos(angle) * 0.02;
                    this.vy -= Math.sin(angle) * 0.02;
                }

                this.x += this.vx;
                this.y += this.vy;

                if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(77, 159, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function createShootingStar() {
            shootingStars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.5,
                len: Math.random() * 80 + 20,
                speed: Math.random() * 10 + 5,
                angle: Math.PI / 4,
                opacity: 1
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => { p.update(); p.draw(); });

            shootingStars.forEach((s, i) => {
                ctx.strokeStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x + Math.cos(s.angle)*s.len, s.y + Math.sin(s.angle)*s.len);
                ctx.stroke();
                s.x += s.speed;
                s.y += s.speed;
                s.opacity -= 0.01;
                if(s.opacity <= 0) shootingStars.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }

        // --- CURSOR TRAIL ---
        function setupCursor() {
            const glow = document.getElementById('mouse-glow');
            const dots = [];
            for(let i=0; i<8; i++) {
                const dot = document.createElement('div');
                dot.className = 'cursor-trail-dot';
                document.body.appendChild(dot);
                dots.push({ el: dot, x: 0, y: 0 });
            }

            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
                glow.style.left = mouse.x + 'px';
                glow.style.top = mouse.y + 'px';
                glow.style.opacity = 1;
            });

            function updateTrail() {
                let x = mouse.x;
                let y = mouse.y;
                dots.forEach((dot, index) => {
                    dot.el.style.transform = `translate(${dot.x}px, ${dot.y}px) scale(${1 - index/10})`;
                    dot.el.style.opacity = (1 - index/8) * 0.5;
                    
                    let nextDot = dots[index + 1] || { x, y };
                    dot.x += (nextDot.x - dot.x) * 0.35;
                    dot.y += (nextDot.y - dot.y) * 0.35;
                });
                requestAnimationFrame(updateTrail);
            }
            updateTrail();
        }

        // --- CORE LOGIC ---
        async function loadRates() {
            const loader = document.getElementById('loading-state');
            loader.style.opacity = 1;
            try {
                const response = await fetch(`${API_URL}${state.from}`);
                const data = await response.json();
                state.rates = data.rates;
                updateResults();
                updateComparison();
                addToHistory();
            } catch (err) {
                console.error("API Failure");
            } finally {
                loader.style.opacity = 0;
            }
        }

        function updateResults() {
            const rate = state.rates[state.to] || 1;
            const converted = state.amount * rate;
            
            // Count-up animation
            animateValue("result-val", parseFloat(document.getElementById('result-val').innerText.replace(/,/g,'')) || 0, converted, 600);
            
            document.getElementById('rate-text').innerText = `1 ${state.from} = ${rate.toFixed(4)} ${state.to}`;
            
            // Dummy Seeded Trend
            const trend = (Math.sin(Date.now()/100000) > 0);
            document.getElementById('rate-trend').innerHTML = trend 
                ? `<span class="pulse-arrow" style="color:var(--up-green)">▲ +${(Math.random()*0.05).toFixed(2)}%</span>`
                : `<span class="pulse-arrow" style="color:var(--down-red)">▼ -${(Math.random()*0.05).toFixed(2)}%</span>`;

            document.getElementById('main-fav').classList.toggle('active', isFavorited());
            drawSparkline(trend);
        }

        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = progress * (end - start) + start;
                obj.innerText = current.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                if (progress < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }

        function swapCurrencies() {
            const btn = document.getElementById('swap-btn');
            btn.style.transform = btn.style.transform === 'rotate(180deg)' ? 'rotate(0deg)' : 'rotate(180deg)';
            [state.from, state.to] = [state.to, state.from];
            updateSelectors();
            loadRates();
        }

        function updateSelectors() {
            const f = currencyData.find(c => c.code === state.from);
            const t = currencyData.find(c => c.code === state.to);
            document.getElementById('from-flag').innerText = f.flag;
            document.getElementById('from-code').innerText = f.code;
            document.getElementById('to-flag').innerText = t.flag;
            document.getElementById('to-code').innerText = t.code;
            document.getElementById('base-unit').innerText = state.from;
        }

        // --- DROPDOWN SYSTEM ---
        function openDropdown(side) {
            state.targetSide = side;
            document.getElementById('dropdown-overlay').style.display = 'flex';
            document.getElementById('search-input').focus();
            filterDropdown();
        }

        function closeDropdown(e) {
            document.getElementById('dropdown-overlay').style.display = 'none';
        }

        function switchTab(tab) {
            state.activeTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase().includes(tab)));
            filterDropdown();
        }

        function filterDropdown() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            let sorted = [...currencyData].sort((a,b) => {
                const key = state.activeTab === 'currency' ? 'code' : 'country';
                return a[key].localeCompare(b[key]);
            });

            let currentLetter = '';
            sorted.forEach(item => {
                const match = item.code.toLowerCase().includes(query) || 
                              item.name.toLowerCase().includes(query) || 
                              item.country.toLowerCase().includes(query);
                
                if(!match) return;

                const groupChar = (state.activeTab === 'currency' ? item.code : item.country)[0].toUpperCase();
                if(groupChar !== currentLetter) {
                    currentLetter = groupChar;
                    const header = document.createElement('div');
                    header.className = 'group-header';
                    header.id = 'group-' + currentLetter;
                    header.innerText = currentLetter;
                    container.appendChild(header);
                }

                const el = document.createElement('div');
                el.className = 'currency-item';
                el.onclick = () => selectCurrency(item.code);
                el.innerHTML = `
                    <span class="flag">${item.flag}</span>
                    <div class="info">
                        <h4>${state.activeTab === 'currency' ? item.code : item.country}</h4>
                        <p>${state.activeTab === 'currency' ? item.name + ' • ' + item.country : item.code + ' • ' + item.name}</p>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        function renderAZ() {
            const az = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            const bar = document.getElementById('az-sidebar');
            az.forEach(l => {
                const s = document.createElement('span');
                s.innerText = l;
                s.onclick = () => {
                    const target = document.getElementById('group-'+l);
                    if(target) target.scrollIntoView({ behavior: 'smooth' });
                };
                bar.appendChild(s);
            });
        }

        function selectCurrency(code) {
            if(state.targetSide === 'from') state.from = code;
            else state.to = code;
            updateSelectors();
            loadRates();
            closeDropdown();
        }

        // --- EXTRAS ---
        function updateComparison() {
            const majors = ['EUR', 'GBP', 'JPY', 'AUD', 'CAD', 'CHF', 'CNY', 'INR'];
            const grid = document.getElementById('comp-grid');
            grid.innerHTML = '';
            majors.forEach(m => {
                if(m === state.from) return;
                const val = state.rates[m] || 0;
                grid.innerHTML += `
                    <div class="comp-item">
                        <div class="c-code">${m}</div>
                        <div class="c-val">${val.toFixed(2)}</div>
                    </div>
                `;
            });
        }

        function addToHistory() {
            const pair = `${state.from}/${state.to}`;
            const entry = {
                pair,
                rate: state.rates[state.to].toFixed(4),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            state.history.unshift(entry);
            state.history = state.history.slice(0, 10);
            localStorage.setItem('conv_history', JSON.stringify(state.history));
            renderHistory();
        }

        function renderHistory() {
            const log = document.getElementById('history-log');
            log.innerHTML = state.history.map(h => `
                <div class="history-row">
                    <span class="h-pair">${h.pair}</span>
                    <span class="h-rate">${h.rate} <small>${h.time}</small></span>
                </div>
            `).join('');
        }

        function toggleFavorite() {
            const pair = `${state.from}/${state.to}`;
            if(isFavorited()) state.favorites = state.favorites.filter(f => f !== pair);
            else state.favorites.push(pair);
            localStorage.setItem('fav_pairs', JSON.stringify(state.favorites));
            updateResults();
        }

        function isFavorited() {
            return state.favorites.includes(`${state.from}/${state.to}`);
        }

        function drawSparkline(isUp) {
            const sCanvas = document.getElementById('sparkline');
            const sCtx = sCanvas.getContext('2d');
            sCanvas.width = sCanvas.offsetWidth;
            sCanvas.height = 100;

            sCtx.clearRect(0,0,sCanvas.width, 100);
            sCtx.beginPath();
            sCtx.strokeStyle = isUp ? '#4ade80' : '#f87171';
            sCtx.lineWidth = 3;
            sCtx.lineJoin = 'round';

            let points = [];
            for(let i=0; i<20; i++) {
                points.push({
                    x: (sCanvas.width / 19) * i,
                    y: 50 + (Math.random() - 0.5) * 60
                });
            }

            sCtx.moveTo(points[0].x, points[0].y);
            points.forEach(p => sCtx.lineTo(p.x, p.y));
            sCtx.stroke();

            // Gradient fill
            sCtx.lineTo(sCanvas.width, 100);
            sCtx.lineTo(0, 100);
            const grad = sCtx.createLinearGradient(0,0,0,100);
            grad.addColorStop(0, isUp ? 'rgba(74, 222, 128, 0.15)' : 'rgba(248, 113, 113, 0.15)');
            grad.addColorStop(1, 'transparent');
            sCtx.fillStyle = grad;
            sCtx.fill();
        }

        window.onload = init;
    </script>
</body>
</html>
